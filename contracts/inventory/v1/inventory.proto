syntax = "proto3";

package inventory.v1;

// COMMAND
message AddItemCommand {
  string name = 1;
  int32 quantity = 2;
}

// COMMAND
message UpdateStockCommand {
  string item_id = 1;
  int32 delta = 2;
}

// QUERY
message GetItemQuery {
  string id = 1;
}

// DOMAIN MODEL
message Item {
  string id = 1;
  string name = 2;
  int32 quantity = 3;
}

// EVENT
message ItemAdded {
  string id = 1;
  string name = 2;
  int32 quantity = 3;
}

// EVENT
message StockUpdated {
  string id = 1;
  int32 delta = 2;
}
