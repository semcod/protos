syntax = "proto3";

package user.v2;

// COMMAND – CreateUser (v2 uses first_name / last_name instead of a single
// password field; password was moved to a dedicated auth service)
message CreateUserCommand {
  string email = 1;
  // field 2 (password) was moved to the auth service in v2
  reserved 2;
  reserved "password";
  string first_name = 3;
  string last_name  = 4;
}

// QUERY – unchanged from v1
message GetUserQuery {
  string id = 1;
}

// DOMAIN MODEL – extended with first_name / last_name
message User {
  string id         = 1;
  string email      = 2;
  string first_name = 3;
  string last_name  = 4;
}
