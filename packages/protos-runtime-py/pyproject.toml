[build-system]
requires = ["setuptools>=68.0.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "protos-runtime"
version = "0.1.0"
description = "Lightweight runtime library for semcod/protos: SQLite-backed Search Index + generated Pydantic contract models. Embedded by downstream applications (e.g. c2004) without requiring the full protogate distribution."
readme = "README.md"
requires-python = ">=3.9"
authors = [
    {name = "semcod", email = "info@semcod.io"},
]
keywords = ["protos", "search", "fts5", "contracts", "pydantic"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
]

dependencies = [
    "pydantic>=2.0.0",
]

[project.license]
text = "Apache-2.0"

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
]

[tool.setuptools.packages.find]
where = ["src"]
include = ["protos_runtime*"]

[tool.setuptools.package-data]
protos_runtime = ["py.typed"]
