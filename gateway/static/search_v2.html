<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Platform V2 — Premium Experience</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --primary: #38bdf8;
            --accent: #818cf8;
            --text: #f1f5f9;
            --text-muted: #94a3b8;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 24px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        h2 {
            font-weight: 600;
            letter-spacing: -0.02em;
            margin-bottom: 24px;
            background: linear-gradient(to right, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 1.8rem;
        }

        .search-container {
            position: sticky;
            top: 0;
            z-index: 10;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(8px);
            padding: 10px 0 20px 0;
            margin-bottom: 20px;
        }

        .search-box {
            display: flex;
            gap: 12px;
            background: var(--card-bg);
            padding: 8px;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            transition: transform 0.2s ease, border-color 0.2s ease;
        }

        .search-box:focus-within {
            transform: translateY(-2px);
            border-color: var(--primary);
        }

        input {
            background: transparent;
            border: none;
            color: var(--text);
            padding: 12px 16px;
            flex-grow: 1;
            font-size: 1rem;
            outline: none;
        }

        input::placeholder {
            color: var(--text-muted);
        }

        button {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s ease, transform 0.1s active;
        }

        button:hover {
            opacity: 0.9;
        }

        button:active {
            transform: scale(0.98);
        }

        .results {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 16px;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            padding: 20px;
            border-radius: 16px;
            border: 1px solid var(--glass-border);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-4px);
            border-color: rgba(56, 189, 248, 0.4);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2), 0 10px 10px -5px rgba(0, 0, 0, 0.1);
        }

        .card h3 {
            margin: 0 0 8px 0;
            font-size: 1.1rem;
            color: var(--text);
        }

        .category {
            display: inline-block;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--primary);
            background: rgba(56, 189, 248, 0.1);
            padding: 4px 8px;
            border-radius: 6px;
            margin-bottom: 12px;
        }

        .details {
            font-size: 0.85rem;
            color: var(--text-muted);
            line-height: 1.5;
        }

        .rank {
            position: absolute;
            bottom: 20px;
            right: 20px;
            font-size: 0.7rem;
            color: var(--text-muted);
            opacity: 0.5;
        }

        .empty-state {
            text-align: center;
            padding: 60px;
            color: var(--text-muted);
        }

        .empty-state svg {
            width: 48px;
            height: 48px;
            margin-bottom: 16px;
            opacity: 0.3;
        }
    </style>
</head>
<body>
    <div class="search-container">
        <h2>Platform Search V2</h2>
        <div class="search-box">
            <input type="text" id="query" placeholder="Czego szukasz dzisiaj?" onkeyup="if(event.key==='Enter') performSearch()">
            <button onclick="performSearch()">Szukaj</button>
        </div>
    </div>
    
    <div id="results" class="results">
        <!-- Results will appear here -->
    </div>

    <script>
        async function performSearch() {
            const q = document.getElementById('query').value;
            const container = document.getElementById('results');
            
            // Loading state
            container.innerHTML = '<div class="empty-state">Szukanie...</div>';

            try {
                const res = await fetch(`/queries/search?q=${encodeURIComponent(q)}`);
                const data = await res.json();
                
                container.innerHTML = '';
                
                if (!data.results || data.results.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="11" cy="11" r="8"></circle>
                                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                            </svg>
                            <p>Brak wyników w nowym indeksie dla zapytania: <strong>${q}</strong></p>
                        </div>
                    `;
                    return;
                }

                data.results.forEach((item, index) => {
                    const div = document.createElement('div');
                    div.className = 'card';
                    div.style.animationDelay = `${index * 0.05}s`;
                    div.innerHTML = `
                        <div class="category">${item.category}</div>
                        <h3>${item.title}</h3>
                        <div class="details">ID: ${item.id}</div>
                        <div class="rank">Relevance: ${item.rank.toFixed(4)}</div>
                    `;
                    container.appendChild(div);
                });
            } catch (err) {
                container.innerHTML = `<div class="empty-state">Błąd połączenia z platformą: ${err.message}</div>`;
            }
        }
        
        // Initial search if any default behavior desired
        // performSearch();
    </script>
</body>
</html>
